<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>BI Clínica Lotus By Pantheon</title><style>:root{--navy:#10243d;--purple:#52245b;--gold:#C1A243;--text:#17142a;--muted:#746a7d;--line:#E5DDE9}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#faf9fb,#f2eef5);color:var(--text)}.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,var(--navy),var(--purple));padding:24px 20px;color:#fff;position:sticky;top:0;height:100vh;overflow:auto}.brand{background:#fff;border-radius:22px;min-height:108px;display:grid;place-items:center;padding:14px;box-shadow:0 20px 50px rgba(16,36,61,.16)}.brand img{max-width:100%;height:auto}.side h1{font-size:14px;letter-spacing:.14em;text-transform:uppercase;opacity:.9;margin:20px 6px}.nav{display:grid;gap:10px}button{font:inherit;cursor:pointer}.nav button{width:100%;padding:15px 16px;border-radius:18px;border:1px solid transparent;background:transparent;color:#fff;font-weight:800;text-align:left}.nav button.active,.nav button:hover{background:rgba(255,255,255,.14)}.note{margin-top:24px;padding:18px;border-radius:22px;background:rgba(255,255,255,.1);line-height:1.55}.main{padding:26px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}h2{font-size:36px;margin:0;letter-spacing:-.04em}.badge{background:#fff;padding:12px 16px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}.hero{background:linear-gradient(135deg,#183553,var(--purple));border-radius:32px;padding:30px;color:#fff;display:grid;grid-template-columns:1.2fr .8fr;gap:20px;margin-bottom:22px;box-shadow:0 24px 60px rgba(16,36,61,.18)}.hero h3{font-size:17px;letter-spacing:.16em;text-transform:uppercase;opacity:.8;margin:0 0 14px}.headline{font-size:clamp(40px,3.4vw,56px);font-weight:900;letter-spacing:-.05em}.sub{line-height:1.55;color:rgba(255,255,255,.9)}.hero-panels{display:grid;gap:12px}.hero-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:18px 20px}.hero-card .label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.75)}.hero-card .value{font-size:30px;font-weight:900;margin-top:7px}.grid-kpi{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:18px}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:26px;box-shadow:0 20px 50px rgba(16,36,61,.08)}.kpi{padding:22px;min-height:158px;position:relative;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}.kpi:before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#183553,var(--gold))}.label{color:var(--muted);font-size:13px;font-weight:700}.kpi .value{font-size:22px;font-weight:900;white-space:nowrap}.kpi .sub{font-size:13px;color:var(--muted)}.currency{font-size:.52em;opacity:.72;font-weight:800}.panel{padding:24px}.panel h3{margin:0;font-size:24px}.desc{margin:8px 0 18px;color:var(--muted)}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}.bars{display:grid;gap:12px}.bar-row{display:grid;grid-template-columns:170px 1fr 140px;gap:12px;align-items:center}.bar-track{height:14px;border-radius:999px;background:#F1EAF3;overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#183553,var(--gold))}.bar-value{text-align:right;font-size:13px;color:var(--muted)}.table-wrap{overflow:auto;max-height:560px;border-radius:18px}table{width:100%;border-collapse:collapse}th,td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:13px;text-align:left}th{position:sticky;top:0;background:#fff;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:12px}.right{text-align:right}.nowrap{white-space:nowrap}.hidden{display:none}.pill{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}.ok{background:#e8f7f0;color:#226347}.bad{background:#fde7ee;color:#9a2646}.alert-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}.metric{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 20px 50px rgba(16,36,61,.08)}.metric-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.metric-value{font-size:28px;font-weight:900;margin-top:10px}.metric-sub{font-size:13px;color:var(--muted);margin-top:8px}.semaforo{display:inline-block;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900}.verde{background:#e9f8f0;color:#1f7a50}.amarelo{background:#fff5dc;color:#8a6200}.vermelho{background:#fde9ee;color:#a22b4a}.rank-list{display:grid;gap:12px}.rank-item{display:grid;grid-template-columns:1.3fr .8fr .7fr auto;gap:12px;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:18px;background:#fff}.rank-name{font-weight:800}.rank-muted{font-size:12px;color:var(--muted)}.tag{padding:5px 8px;border-radius:999px;background:#f2edf4;color:var(--muted);font-size:12px;font-weight:800}@media(max-width:1400px){.grid-kpi{grid-template-columns:repeat(3,1fr)}.alert-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:1100px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.hero,.grid-2{grid-template-columns:1fr}}@media(max-width:720px){.main{padding:16px}.grid-kpi,.alert-grid{grid-template-columns:1fr}.bar-row,.rank-item{grid-template-columns:1fr}}</style></head><body><div class="app"><aside class="side"><div class="brand"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAgMAAACzCAIAAACb7IhcAAAQAElEQVR4AewdBWAUx3Zn9zTuLsSI4e4UdyhWKNIWKV68FC0OpbRYqdDfFigtheJW3B2CQ0Lc3eX8dve/vQvhcrmES7iES9hlmMzOvHnz5s3ue2/e293DafZgOcBygOUAy4H3mwM4xh4sB1gOsBxgOfB+c4DVBO/3+rOzf384wM6U5UD5HGA1Qfm8YVtYDrAcYDnwfnCA1QTvxzqzs2Q5wHKA5UD5HGA1Qfm8qX0tLMUsB1gOsByoCgdYTVAVrrF9WA6wHGA5UJc4w  class="right">Pago</th><th class="right">Diferença</th></tr></thead><tbody>${(DATA.concRows||[]).map(r=>`<tr><td>${pill(r.status)}</td><td>${r.convenio}</td><td>${r.paciente}</td><td>${r.guia}</td><td>${r.MesLabel}</td><td>${r.Quinzena}</td><td class="right nowrap">${fmtMoney(r.previsto)}</td><td class="right nowrap">${fmtMoney(r.pago)}</td><td class="right nowrap">${fmtMoney(r.diferenca)}</td></tr>`).join('')}</tbody></table></div></section>`;document.getElementById('page-alertas').innerHTML=`<section class="alert-grid"><div class="metric"><div class="metric-label">Semáforo automático</div><div class="metric-value"><span class="semaforo ${a.score}">${a.scoreLabel}</span></div><div class="metric-sub">Leitura baseada no valor pendente total.</div></div><div class="metric"><div class="metric-label">Valor pendente</div><div class="metric-value">${moneyHTML(a.totalPendente)}</div><div class="metric-sub">Soma das maiores pendências não pagas.</div></div><div class="metric"><div class="metric-label">Convênio crítico</div><div class="metric-value">${a.criticos[0]?.convenio||'—'}</div><div class="metric-sub">${fmtMoney(a.criticos[0]?.valor||0)} em ${a.criticos[0]?.qtd||0} guias.</div></div><div class="metric"><div class="metric-label">Guias previstas</div><div class="metric-value">${DATA.kpis.guiasPrevistas}</div><div class="metric-sub">Carteira total do CSV de previsão.</div></div></section><section class="grid-2"><section class="card panel"><h3>Convênios críticos</h3><div class="rank-list">${(a.criticos||[]).map((r,i)=>`<div class="rank-item"><div><div class="rank-name">${i+1}. ${r.convenio}</div><div class="rank-muted">${r.qtd} guias em aberto</div></div><div class="right">${fmtMoney(r.valor)}</div><div><span class="tag">${r.qtd} itens</span></div><div>${i===0?'<span class="semaforo vermelho">Crítico</span>':i<3?'<span class="semaforo amarelo">Atenção</span>':'<span class="semaforo verde">Monitorar</span>'}</div></div>`).join('')}</div></section><section class="card panel"><h3>Ranking de glosa por convênio</h3><div class="rank-list">${(a.glosaRanking||[]).map((r,i)=>`<div class="rank-item"><div><div class="rank-name">${i+1}. ${r.convenio}</div><div class="rank-muted">${r.guias} guias pagas</div></div><div class="right">${fmtMoney(r.glosa)}</div><div class="right">${fmtPct(r.repasse?Math.abs(r.glosa)/r.repasse:0)}</div><div><span class="tag">Glosa</span></div></div>`).join('')}</div></section></section><section class="card panel"><h3>Guias não pagas</h3><div class="table-wrap"><table><thead><tr><th>Convênio</th><th>Paciente</th><th>Guia</th><th>Mês</th><th>Quinzena</th><th class="right">Diferença</th></tr></thead><tbody>${(DATA.alertRows||[]).map(r=>`<tr><td>${r.convenio}</td><td>${r.paciente}</td><td>${r.guia}</td><td>${r.MesLabel}</td><td>${r.Quinzena}</td><td class="right nowrap">${fmtMoney(r.diferenca)}</td></tr>`).join('')}</tbody></table></div></section>`}function showPage(p){['overview','previsao','lucro','conciliacao','alertas'].forEach(x=>document.getElementById('page-'+x).classList.toggle('hidden',x!==p));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===p))}document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));render();showPage('overview');</script></body></html>
